# Railway deployment configuration for TF AI-QC backend
# See: https://docs.railway.app/reference/config-as-code

[build]
  builder = "NIXPACKS"
  buildCommand = "pip install -e .[dev] && alembic upgrade head && python -m app.cli seed-rules"

[deploy]
  startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[services]]
  name = "tf-ai-qc-backend"

# Cron job: retry stuck reports every 30 minutes
[[services]]
  name = "tf-ai-qc-cron"
  startCommand = "echo 'cron runner'"

# NOTE: Ollama runs as a separate Railway service (glm-4.7-flash)
# Set OLLAMA_BASE_URL to the internal Railway service URL
